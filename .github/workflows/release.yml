name: Manual Release macOS App

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: v1.0.2)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  release:
    name: Build and Release DMG
    runs-on: macos-latest

    steps:
      # Checkout full repository history
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Create and push tag if not exists
      - name: Create and push tag
        run: |
          set -e

          VERSION=${{ github.event.inputs.version }}

          echo "Creating tag: $VERSION"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag already exists."
          else
            git tag "$VERSION"
            git push origin "$VERSION"
          fi

      # Build Release app
      - name: Build Release .app
        run: |
          set -e

          xcodebuild \
            -project QLPlainView.xcodeproj \
            -scheme QLPlainView \
            -configuration Release \
            -derivedDataPath ./DerivedData \
            clean build

          APP_PATH="./DerivedData/Build/Products/Release/QLPlainView.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "App not found."
            exit 1
          fi

          mkdir -p artifacts
          cp -R "$APP_PATH" ./artifacts/

          ls -la artifacts

      # Install create-dmg tool
      - name: Install create-dmg
        run: brew install create-dmg

      # Create DMG file
      - name: Create DMG
        run: |
          set -e

          VERSION=${{ github.event.inputs.version }}

          create-dmg \
            --volname "QLPlainView" \
            "./artifacts/QLPlainView-$VERSION.dmg" \
            "./artifacts/"

          ls -la artifacts

      # Generate release notes using GitHub official API
      - name: Generate Release Notes
        id: generate_notes
        run: |
          set -e

          VERSION=${{ github.event.inputs.version }}

          PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -v "$VERSION" | head -n 1)

          echo "Current tag: $VERSION"
          echo "Previous tag: $PREVIOUS_TAG"

          if [ -z "$PREVIOUS_TAG" ]; then
            NOTES=$(gh api \
              repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="$VERSION" \
              -q .body)
          else
            NOTES=$(gh api \
              repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="$VERSION" \
              -f previous_tag_name="$PREVIOUS_TAG" \
              -q .body)
          fi

          # Fallback to git log if only Full Changelog is returned
          if echo "$NOTES" | grep -q "Full Changelog"; then
            echo "Falling back to git log summary..."

            NOTES="## Changes\n\n$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:'- %s')"
          fi

          echo "RELEASE_BODY<<EOF" >> $GITHUB_ENV
          echo "$NOTES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          body: ${{ env.RELEASE_BODY }}
          files: artifacts/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
