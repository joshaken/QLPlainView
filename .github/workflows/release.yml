name: Release macOS App

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release .dmg
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Release .app
        run: |
          set -e

          xcodebuild \
            -project QLPlainView.xcodeproj \
            -scheme QLPlainView \
            -configuration Release \
            -derivedDataPath ./DerivedData \
            clean build

          APP_PATH="./DerivedData/Build/Products/Release/QLPlainView.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "❌ App not found at $APP_PATH"
            exit 1
          fi

          mkdir -p artifacts
          cp -R "$APP_PATH" ./artifacts/

          echo "✅ App copied to artifacts/"
          ls -la artifacts

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create .dmg
        run: |
          set -e

          create-dmg \
            --volname "QLPlainView" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 128 \
            --icon "QLPlainView.app" 200 190 \
            --hide-extension "QLPlainView.app" \
            --app-drop-link 600 185 \
            "./artifacts/QLPlainView.dmg" \
            "./artifacts/"

          echo "✅ DMG created"
          ls -la artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/QLPlainView.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
