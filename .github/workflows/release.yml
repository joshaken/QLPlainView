name: Manual Release macOS App

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: v1.0.2)"
        required: true
        default: "v1.0.0"
permissions:
  contents: write 
jobs:
  release:
    name: Build and Release .dmg
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1️⃣ push tag
      - name: Create and push tag
        run: |
          VERSION=${{ github.event.inputs.version }}

          echo "Creating tag: $VERSION"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag $VERSION
          git push origin $VERSION

      # 2️⃣ build App
      - name: Build Release .app
        run: |
          set -e

          xcodebuild \
            -project QLPlainView.xcodeproj \
            -scheme QLPlainView \
            -configuration Release \
            -derivedDataPath ./DerivedData \
            clean build

          APP_PATH="./DerivedData/Build/Products/Release/QLPlainView.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "❌ App not found!"
            exit 1
          fi

          mkdir -p artifacts
          cp -R "$APP_PATH" ./artifacts/

          ls -la artifacts

      # 3️⃣ install create-dmg
      - name: Install create-dmg
        run: brew install create-dmg

      # 4️⃣ create dmg
      - name: Create .dmg
        run: |
          set -e

          VERSION=${{ github.event.inputs.version }}

          create-dmg \
            --volname "QLPlainView" \
            "./artifacts/QLPlainView-$VERSION.dmg" \
            "./artifacts/"

          ls -la artifacts

      # 5️⃣ create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
